x-remote-ocr-model: &remote_ocr_model qwen/qwen3-vl-8b-instruct

services:
  pdf-document-layout-analysis-gpu:
    container_name: pdf-document-layout-analysis-gpu
    image: pdf-document-layout-analysis-gpu
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    gpus: all
    ports:
      - "5060:5060"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - paddleocr_models:/home/python/.paddlex
    environment:
      RESTART_IF_NO_GPU: ${RESTART_IF_NO_GPU:-false}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OCR_ENGINE: ${OCR_ENGINE:-paddleocr}
      OCR_DOWNSAMPLE_ABOVE: ${OCR_DOWNSAMPLE_ABOVE:-1200}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      PADDLE_PDX_ENABLE_MKLDNN_BYDEFAULT: "False"
      REMOTE_OCR_ENABLED: "true"
      REMOTE_OCR_BASE_URL: https://openrouter.ai/api/v1
      REMOTE_OCR_API_KEY: ${OPENROUTER_API_KEY}
      REMOTE_OCR_MODEL: *remote_ocr_model
      REMOTE_OCR_TEMPERATURE: "0.5"
      REMOTE_OCR_TIMEOUT_SEC: "120"
      REMOTE_OCR_MAX_CONCURRENCY: ${REMOTE_OCR_MAX_CONCURRENCY:-4}
    networks:
      - pdf-analysis-network

volumes:
  paddleocr_models:

networks:
  pdf-analysis-network:
    driver: bridge


