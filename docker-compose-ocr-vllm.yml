x-remote-ocr-model: &remote_ocr_model nanonets/Nanonets-OCR2-3B
#x-remote-ocr-model: &remote_ocr_model Qwen/Qwen3-VL-8B-Instruct

services:
  vllm-ocr:
    image: vllm/vllm-openai:latest
    container_name: vllm-ocr
    command: ["--model", *remote_ocr_model, "--host", "0.0.0.0", "--port", "8000", "--gpu-memory-utilization", "0.12", "--max-model-len", "4096", "--max-num-seqs", "16", "--max-num-batched-tokens", "4096"]
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 200s
      timeout: 10s
      retries: 10
      start_period: 2000s
    networks:
      - pdf-analysis-network

  pdf-document-layout-analysis-gpu:
    container_name: pdf-document-layout-analysis-gpu
    image: pdf-document-layout-analysis-gpu
    pull_policy: build
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    gpus: all
    ports:
      - "5060:5060"
    depends_on:
      vllm-ocr:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - app_models:/app/models
      - paddleocr_models:/home/python/.paddlex
    environment:
      RESTART_IF_NO_GPU: ${RESTART_IF_NO_GPU:-false}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OCR_ENGINE: ${OCR_ENGINE:-paddleocr}
      OCR_DOWNSAMPLE_ABOVE: ${OCR_DOWNSAMPLE_ABOVE:-1200}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      PADDLE_PDX_ENABLE_MKLDNN_BYDEFAULT: "False"
      REMOTE_OCR_ENABLED: "true"
      REMOTE_OCR_BASE_URL: http://vllm-ocr:8000/v1
      REMOTE_OCR_API_KEY: "123"
      REMOTE_OCR_MODEL: *remote_ocr_model
      REMOTE_OCR_TEMPERATURE: "0.5"
      REMOTE_OCR_TIMEOUT_SEC: "120"
      REMOTE_OCR_MAX_CONCURRENCY: ${REMOTE_OCR_MAX_CONCURRENCY:-16}
    networks:
      - pdf-analysis-network

volumes:
  app_models:
  paddleocr_models:

networks:
  pdf-analysis-network:
    driver: bridge


