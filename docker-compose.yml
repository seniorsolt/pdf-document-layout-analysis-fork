services:
  ollama:
    container_name: ollama-service
    build:
      context: .
      dockerfile: Dockerfile.ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pdf-analysis-network

  pdf-document-layout-analysis:
    container_name: pdf-document-layout-analysis
    image: pdf-document-layout-analysis
    pull_policy: build
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5060:5060"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - app_models:/app/models
    environment:
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
      OCR_DOWNSAMPLE_ABOVE: ${OCR_DOWNSAMPLE_ABOVE:-1200}
      OLLAMA_HOST: http://ollama:11434
    networks:
      - pdf-analysis-network

  pdf-document-layout-analysis-gui:
    container_name: pdf-document-layout-analysis-gui
    entrypoint: [ "python", "./src/gradio_app.py" ]
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.gradio
    ports:
      - "7860:7860"
    depends_on:
      ollama:
        condition: service_healthy
      pdf-document-layout-analysis:
        condition: service_started
    environment:
      - API_BASE_URL=http://pdf-document-layout-analysis:5060
    networks:
      - pdf-analysis-network

volumes:
  app_models:

networks:
  pdf-analysis-network:
    driver: bridge
