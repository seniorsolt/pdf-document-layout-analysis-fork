services:
  ollama-gpu:
    extends:
      file: docker-compose.yml
      service: ollama
    container_name: ollama-service-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  pdf-document-layout-analysis-gpu:
    container_name: pdf-document-layout-analysis-gpu
    image: pdf-document-layout-analysis-gpu
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5060:5060"
    depends_on:
      ollama-gpu:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - paddleocr_models:/home/python/.paddlex
    environment:
      RESTART_IF_NO_GPU: ${RESTART_IF_NO_GPU:-false}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OCR_ENGINE: ${OCR_ENGINE:-paddleocr}
      OCR_DOWNSAMPLE_ABOVE: ${OCR_DOWNSAMPLE_ABOVE:-1200}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      PADDLE_PDX_ENABLE_MKLDNN_BYDEFAULT: "False"
      OLLAMA_HOST: http://ollama-gpu:11434
    networks:
      - pdf-analysis-network

  pdf-document-layout-analysis-gui-gpu:
    container_name: pdf-document-layout-analysis-gui-gpu
    entrypoint: [ "python", "./src/gradio_app.py" ]
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.gradio
    ports:
      - "7860:7860"
    depends_on:
      ollama-gpu:
        condition: service_healthy
      pdf-document-layout-analysis-gpu:
        condition: service_started
    environment:
      - API_BASE_URL=http://pdf-document-layout-analysis-gpu:5060
    networks:
      - pdf-analysis-network

volumes:
  paddleocr_models:

networks:
  pdf-analysis-network:
    driver: bridge